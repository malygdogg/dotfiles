set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# remap prefix to Ctrl+a (easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# mouse support
set -g mouse on

# start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# re-number windows when one is closed
set -g renumber-windows on

# increase scrollback buffer
set -g history-limit 10000

# no delay after Esc (critical for Neovim)
set -sg escape-time 0

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# move status bar to top (personal preference, keeps bottom clean for Neovim)
set -g status-position top

# status bar colors
set -g status-style bg='#1a1b26',fg='#a9b1d6'

# current window highlight
set -g window-status-current-style bg='#7aa2f7',fg='#1a1b26',bold

# pane border colors
set -g pane-border-style fg='#3b4261'
set -g pane-active-border-style fg='#7aa2f7'

# status bar content
set -g status-left '#[fg=#9ece6a,bold] #S '
set -g status-left-length 20
set -g status-right '#[fg=#a9b1d6] %H:%M #[fg=#9ece6a]%d %b '
set -g status-right-length 40

# window title format
#setw -g window-status-format ' #I:#W '
#setw -g window-status-current-format ' #I:#W '

# show pane title
set -g pane-border-status top
set -g pane-border-format ' #P: #{pane_current_command} | #{b:pane_current_path} '
#set -g pane-border-format ' #{pane_title} '

# name panes manually
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"

set-option -g focus-events on

